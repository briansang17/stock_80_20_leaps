name: Daily LEAPS Signal Check

on:
  schedule:
    # Fire at 21:00 and 22:00 UTC daily.  The guard step below runs the
    # scanner only when the wall clock in New York is 5pm (17:00 ET),
    # so one email lands at ~5pm ET year-round (EDT vs EST).
    - cron: '0 21 * * *'   # 5pm EDT  (mid-Mar -> early Nov)
    - cron: '0 22 * * *'   # 5pm EST  (early Nov -> mid-Mar)
  workflow_dispatch:         # allow manual trigger from GitHub UI
    inputs:
      force:
        description: 'Force email even when no signals fire (scheduled runs always force)'
        required: false
        default: 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Skip if not 5pm in New York
        id: timecheck
        run: |
          # Manual workflow_dispatch always runs; scheduled runs only at 5pm ET.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Manual trigger — running."
          else
            HOUR_ET=$(TZ=America/New_York date +%H)
            echo "Current hour in New York: $HOUR_ET"
            if [ "$HOUR_ET" = "17" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
              echo "✅ It is 5pm ET — running scanner."
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "⏭  Not 5pm ET — skipping (other cron will fire instead)."
            fi
          fi

      - name: Checkout repository
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.timecheck.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r final_leaps/requirements.txt

      - name: Run COMBINED BUY+SELL signal scanner (daily digest email)
        if: steps.timecheck.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO:   ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          # Always --force: email every run (market snapshot + matrix) even when
          # no BUY/SELL rules fire.  Without this, most days send nothing.
          ARGS="--force"
          if [ "${{ github.event.inputs.force }}" = "false" ]; then
            ARGS=""
          fi
          python final_leaps/daily_signal_top10.py $ARGS

      - name: Upload log artifact (signal history)
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-signal-log
          path: final_leaps/results/daily_top10_log.csv
          retention-days: 90
          if-no-files-found: ignore
