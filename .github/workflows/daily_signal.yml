name: Daily LEAPS Signal Check

on:
  schedule:
    # Fire on BOTH 21:00 and 22:00 UTC Mon-Fri.  A guard step below
    # only actually runs the scanner when the wall clock in New York
    # is 5pm (17:00 ET).  This makes the email arrive at 5pm ET
    # year-round (auto-handles EDT vs EST).
    - cron: '0 21 * * 1-5'   # 5pm EDT  (mid-Mar -> early Nov)
    - cron: '0 22 * * 1-5'   # 5pm EST  (early Nov -> mid-Mar)
  workflow_dispatch:         # allow manual trigger from GitHub UI
    inputs:
      force:
        description: 'Force email even when no signals fire'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Skip if not 5pm in New York
        id: timecheck
        run: |
          # Manual workflow_dispatch always runs; scheduled runs only at 5pm ET.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "✅ Manual trigger — running."
          else
            HOUR_ET=$(TZ=America/New_York date +%H)
            echo "Current hour in New York: $HOUR_ET"
            if [ "$HOUR_ET" = "17" ]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
              echo "✅ It is 5pm ET — running scanner."
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
              echo "⏭  Not 5pm ET — skipping (other cron will fire instead)."
            fi
          fi

      - name: Checkout repository
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.timecheck.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run BUY signal scanner (top-10 entry rules)
        if: steps.timecheck.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO:   ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python daily_signal_top10.py $ARGS

      - name: Run SELL signal scanner (top-10 exit rules)
        if: steps.timecheck.outputs.run == 'true'
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO:   ${{ secrets.SMTP_TO }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python sell_signals/daily_sell_check.py $ARGS

      - name: Upload log artifact (signal history)
        if: steps.timecheck.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-signal-log
          path: results/daily_top10_log.csv
          retention-days: 90
          if-no-files-found: ignore
